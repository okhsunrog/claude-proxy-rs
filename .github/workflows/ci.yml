name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: mkdir -p admin-ui/dist
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  sqlx:
    name: SQLx
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: claude_proxy
          POSTGRES_PASSWORD: claude_proxy
          POSTGRES_DB: claude_proxy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://claude_proxy:claude_proxy@localhost:5432/claude_proxy
      SQLX_OFFLINE: false
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: mkdir -p admin-ui/dist

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls --locked

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check sqlx cache is up to date
        run: cargo sqlx prepare --check -- --all-targets

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          working-directory: admin-ui

      - run: vp check
        working-directory: admin-ui
